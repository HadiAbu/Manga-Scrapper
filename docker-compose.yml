services:
  nginx:
    image: ghcr.io/hadiabu/scalable-scraper-nginx:no_auth
    build:
      context: .
      dockerfile: nginx/Dockerfile
    pull_policy: always
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

  api:
    image: ghcr.io/hadiabu/scalable-scraper-api:no_auth
    build:
      context: ./api
    pull_policy: always
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 12

  scraper:
    image: ghcr.io/hadiabu/scalable-scraper-scraper:no_auth
    build:
      context: ./scraper
    pull_policy: always
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - MAX_PAGES=200
    depends_on:
      opensearch:
        condition: service_healthy

volumes:
  opensearch_data:
