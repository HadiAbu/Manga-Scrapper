services:
  nginx:
    image: ghcr.io/hadiabu/scalable-scraper-nginx:latest
    pull_policy: always
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  api:
    image: ghcr.io/hadiabu/scalable-scraper-api:latest
    pull_policy: always
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080/auth
      - KEYCLOAK_PUBLIC_URL=http://localhost/auth
      - KEYCLOAK_REALM=manga
    depends_on:
      opensearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 12

  keycloak-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HTTP_RELATIVE_PATH=/auth
      - KC_HOSTNAME_STRICT=false
      - KC_HEALTH_ENABLED=true
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  scraper:
    image: ghcr.io/hadiabu/scalable-scraper-scraper:latest
    pull_policy: always
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - MAX_PAGES=200
    depends_on:
      opensearch:
        condition: service_healthy

volumes:
  opensearch_data:
  keycloak_db_data:
