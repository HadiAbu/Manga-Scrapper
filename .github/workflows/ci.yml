name: CI - Build, Test, and Push

on:
  push:
    branches: ["master"]

env:
  REGISTRY: ghcr.io

jobs:
  # ── 1. Build images locally, spin up the full stack, smoke-test ──────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.1.6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build API image (local, no push)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./api
          load: true
          tags: scalable-scraper-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Scraper image (local, no push)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./scraper
          load: true
          tags: scalable-scraper-scraper:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Nginx image (local, no push)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: nginx/Dockerfile
          load: true
          tags: scalable-scraper-nginx:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      - name: Wait for API health
        run: |
          echo "Waiting for API to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost/api/health; then
              echo ""
              echo "API is healthy after attempt $i"
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 10s"
            sleep 10
          done
          echo "API never became healthy after 300s"
          exit 1

      - name: Smoke tests
        run: |
          # /api/health — must return 200
          curl -sf http://localhost/api/health

          # /api/search — no auth required, must return 200
          STATUS=$(curl -o /dev/null -sw "%{http_code}" "http://localhost/api/search?q=naruto")
          [ "$STATUS" = "200" ] || { echo "Expected 200 on /api/search, got $STATUS"; exit 1; }

          echo "All smoke tests passed"

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

  # ── 2. Build and push all three images in parallel (only if test passes) ──
  push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            image: hadiabu/scalable-scraper-api
            context: ./api
            dockerfile: ./api/Dockerfile
          - name: scraper
            image: hadiabu/scalable-scraper-scraper
            context: ./scraper
            dockerfile: ./scraper/Dockerfile
          - name: nginx
            image: hadiabu/scalable-scraper-nginx
            context: .
            dockerfile: nginx/Dockerfile

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.1.6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to the Container registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=raw,value=no_auth
            type=sha,format=short,prefix=no_auth-

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
